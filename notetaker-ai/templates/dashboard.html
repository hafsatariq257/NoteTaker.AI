<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library - NoteTaker.ai</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg-dark: #070b14;
            --sidebar-bg: #0f172a;
            --card-bg: #161b28;
            --accent: #00d2ff;
            --text-main: #ffffff;
            --danger: #ff4d4d;
        }

        body {
            margin: 0;
            display: flex;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
        }

        /* --- SIDEBAR STYLE --- */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            height: 100vh;
            position: fixed;
            display: flex;
            flex-direction: column;
            padding: 25px 20px;
            border-right: 1px solid #1e293b;
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            padding-left: 10px;
        }

        .brand-logo {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar h2 { 
            color: var(--accent); 
            margin: 0; 
            font-size: 1.4rem;
            letter-spacing: -0.5px;
        }

        .sidebar-link {
            color: #94a3b8;
            text-decoration: none;
            padding: 14px 16px;
            margin: 4px 0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
            font-weight: 500;
        }

        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(0, 210, 255, 0.1);
            color: var(--accent);
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            margin-left: 260px;
            padding: 40px 60px;
            width: calc(100% - 260px);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
        }

        .btn-new {
            background: var(--accent);
            color: #000;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        .btn-new:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .meetings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px;
        }

        .meeting-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid #2d3748;
            transition: 0.3s;
        }

        .meeting-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
        }

        .btn-delete {
            background: rgba(255, 77, 77, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-delete:hover {
            background: var(--danger);
            color: white;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand-section">
            <div class="brand-logo">
                <i class="ph-fill ph-microphone-stage" style="color: #000;"></i>
            </div>
            <h2>NoteTaker.ai</h2>
        </div>

        <a href="{{ url_for('dashboard') }}" class="sidebar-link active">
            <i class="ph ph-squares-four"></i> Library
        </a>
        <a href="{{ url_for('new_meeting') }}" class="sidebar-link">
            <i class="ph ph-microphone"></i> New Session
        </a>
        <a href="{{ url_for('settings') }}" class="sidebar-link">
            <i class="ph ph-gear"></i> Settings
        </a>

        <div style="margin-top: auto;">
            <a href="{{ url_for('logout') }}" class="sidebar-link" style="color: var(--danger);">
                <i class="ph ph-sign-out"></i> Logout
            </a>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Welcome, User!</h1>
            <a href="{{ url_for('new_meeting') }}" class="btn-new">+ New Session</a>
        </div>

        <h3 style="margin-bottom: 25px; color: #94a3b8;">Your Recent Notes</h3>

        <div class="meetings-grid">
            {% for m in meetings %}
            <div class="meeting-card">
                <h3 style="color: var(--accent); margin-top: 0;">{{ m.title }}</h3>
                <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 15px;">
                    <i class="ph ph-calendar"></i> {{ m.created_at.strftime('%B %d, %Y') }}
                </p>
                <p style="line-height: 1.6; color: #cbd5e0;">{{ m.summary[:130] }}...</p>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 25px;">
                    <a href="{{ url_for('view_meeting', meeting_id=m.id) }}" style="color: var(--accent); text-decoration: none; font-weight: 600;">View Details</a>
                    
                    <button onclick="confirmDelete('{{ m.id }}')" class="btn-delete">
                        <i class="ph ph-trash"></i> Delete
                    </button>
                </div>
            </div>
            {% else %}
            <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #94a3b8;">
                <i class="ph ph-folder-open" style="font-size: 3rem; display: block; margin-bottom: 10px;"></i>
                No sessions found. Start your first recording!
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        function confirmDelete(id) {
            if (confirm("Are you sure you want to delete this session?")) {
                fetch(`/delete-meeting/${id}`, { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if (data.success) window.location.reload();
                    else alert("Error deleting session.");
                });
            }
        }
    </script>
</body>
</html>
